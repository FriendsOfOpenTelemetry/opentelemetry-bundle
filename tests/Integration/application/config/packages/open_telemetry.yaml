open_telemetry:
  service:
    namespace: 'FriendsOfOpenTelemetry'
    name: 'Integration/application'
    version: '0.0.0'
    environment: '%kernel.environment%'
  instrumentation:
    cache:
      tracing:
        enabled: true
    console:
      tracing:
        enabled: true
    doctrine:
      tracing:
        enabled: true
    http_client:
      tracing:
        enabled: true
    http_kernel:
      tracing:
        enabled: true
    mailer:
      tracing:
        enabled: true
    messenger:
      tracing:
        enabled: true
    twig:
      tracing:
        enabled: true
  traces:
    tracers:
      main:
        provider: 'open_telemetry.traces.providers.default'
    providers:
      default:
        type: default
        sampler: always_on
        processors:
          - 'open_telemetry.traces.processors.otlp'
    processors:
      otlp:
        type: simple
        exporter: 'open_telemetry.traces.exporters.otlp'
      console:
        type: simple
        exporter: 'open_telemetry.traces.exporters.console'
    exporters:
      otlp:
        dsn: http+otlp://otel-collector:4318
