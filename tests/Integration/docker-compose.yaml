version: '3'
services:
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
  database:
    image: postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432"
  app:
    build:
      context: .
      dockerfile: application/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./application:/app
