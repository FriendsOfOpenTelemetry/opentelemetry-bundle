type: PollingProfile
spec:
  name: Default
  strategy: periodic
  default: true
  periodic:
    retryDelay: 5s
    timeout: 10m
---
type: DataStore
spec:
  name: Grafana Tempo
  type: tempo
  default: true
  tempo:
    type: grpc
    grpc:
      endpoint: tempo:9095
      tls:
        insecure: true
